name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core package (no extras)
        run: pip install -e .

      - name: Verify import works without extras
        run: python -c "import torq; print(torq.__version__)"

      - name: Install dev extras and optional dependencies for testing
        run: pip install -e ".[dev,vision,ros2]" pandas

      - name: Lint
        run: ruff check src/ && ruff format --check src/

      - name: Import graph gate
        run: pytest tests/test_imports.py -v

      - name: Unit tests
        shell: bash
        run: |
          pytest tests/unit/ -v
          exit_code=$?
          # Exit code 5 = no tests collected (expected during bootstrap phase)
          [[ $exit_code -eq 0 || $exit_code -eq 5 ]] || exit $exit_code
