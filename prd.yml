# 8. COMPETITIVE THREAT MATRIX (Updated)
# ══════════════════════════════════════════════════════════════════════════════

competitive_threat_matrix:
  note: "v2.0 changes: Alloy elevated from LOW-MED to HIGH. Neuracore elevated to MEDIUM-HIGH."

  competitors:
    - name: "Alloy"
      threat: "HIGH"
      key_strength: "$3M funded, 4 design partners, MCAP ingestion, NL search, 'Scenarios to Training Data', Blackbird+Airtree, same geography"
      critical_gap: "No episode model, no quality scoring, no composition, no training pipeline, no sim. Mission/scenario ontology structurally different."

    - name: "Foxglove"
      threat: "HIGH"
      key_strength: "MCAP standard creator, cloud platform, enterprise customers, strong brand"
      critical_gap: "No ML pipeline, no episode management, no training integration. Visualization tool, not data platform."

    - name: "LeRobot/HF"
      threat: "MED-HIGH"
      key_strength: "Community standard, open format, policy library, HW support"
      critical_gap: "No cloud infra, no quality tools, no team features, no composition engine."

    - name: "Neuracore"
      threat: "MED-HIGH"
      key_strength: "Most similar vision, academic credibility, recent seed round"
      critical_gap: "Pre-seed ($3M), tiny team, 12-18 months behind in execution."

    - name: "Scale AI"
      threat: "MEDIUM"
      key_strength: "Resources ($29B), Physical AI Data Engine announced"
      critical_gap: "Managed service model, not developer tooling. Extremely expensive."

    - name: "NVIDIA Isaac"
      threat: "MEDIUM"
      key_strength: "Full sim stack, OSMO orchestration, ecosystem gravity"
      critical_gap: "Explicitly lacks dashboards, artifact registry, experiment tracking. Sim-only."

    - name: "Rerun"
      threat: "MEDIUM"
      key_strength: "9.3K GitHub stars, elegant data model, dataframe API"
      critical_gap: "No cloud platform yet, no ML features, no training integration."

    - name: "W&B"
      threat: "LOW"
      key_strength: "Developer experience gold standard, massive adoption"
      critical_gap: "CoreWeave-owned, focused on LLMs. No robotics-specific features."

