# 1. STRATEGIC CONTEXT
# ══════════════════════════════════════════════════════════════════════════════

strategic_context:

  alloy_intervention_problem:
    supersedes: "PRD v1.0"
    previous_assessment: "LOW-MED threat"
    current_assessment: "HIGH threat"
    rationale: >
      Alloy's February 2025 launch, AUD $4.5M pre-seed (Blackbird + Airtree),
      4 Australian design partners, and explicit 'Scenarios Become Training Data'
      feature signal a clear intent to bridge from operational monitoring into
      training data infrastructure. Their MCAP/ROS ingestion pipeline, natural
      language search, and multi-modal data unification share the same front door
      as Torque. The question is no longer whether Alloy will move upstream into
      training — it's when.

    critical_strategic_assumption: >
      Alloy can add crude training data export features (scenario-to-dataset,
      basic DataLoader export) within 6–12 months. Their architecture, built on
      mission/scenario ontology, cannot easily support episode quality scoring,
      dataset composition, sim-to-real mixing, or cross-embodiment normalization
      without a fundamental product rewrite. Torque's defensibility depends on
      going DEEPER into ML training workflows, not wider into general data
      management. Every feature in this PRD is evaluated against the question:
      'Could Alloy replicate this by extending their existing architecture?'

  product_vision:
    statement: >
      Torque is the data infrastructure platform for robot learning — managing
      the full lifecycle from episode recording through dataset curation to
      policy training. It captures understanding, not just trajectories, enabling
      robots to learn faster from fewer demonstrations.
    positioning: >
      Alloy is Datadog for deployed robots. Torque is Weights & Biases for
      robot learning. They monitor production. We optimize training. Both are
      needed, neither replaces the other.
    architectural_mandate: >
      This framing is not just a talking point — it's an architectural mandate.
      Every technical decision in this PRD reinforces the boundary between
      operational monitoring and training optimization.

  competitive_position_summary:
    dimensions:
      - dimension: "Ontology"
        alloy: "Missions & Scenarios (operational)"
        torque: "Episodes & Demonstrations (training)"
      - dimension: "Primary User"
        alloy: "Fleet ops engineer, field technician"
        torque: "ML researcher, robot learning engineer"
      - dimension: "Core Workflow"
        alloy: "Deploy → Monitor → Debug → Report"
        torque: "Demonstrate → Ingest → Score → Curate → Train"
      - dimension: "Data Model"
        alloy: "Time-series logs, sensor streams, video"
        torque: "Structured episodes with action-observation pairs, quality metadata"
      - dimension: "Output"
        alloy: "Bug reports, fleet dashboards, anomaly clusters"
        torque: "Training datasets, PyTorch DataLoaders, trained policies"
      - dimension: "Overlap Zone"
        alloy: "MCAP ingestion, NL search, scenario export"
        torque: "MCAP ingestion, NL search, data browsing"
      - dimension: "Alloy Cannot"
        alloy: "Episode quality scoring, dataset composition, sim-to-real mixing, cross-embodiment normalization, training pipeline integration, policy experiment tracking"
        torque: "—"

