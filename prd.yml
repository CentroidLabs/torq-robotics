# 0. EXECUTIVE SUMMARY
# ══════════════════════════════════════════════════════════════════════════════

executive_summary:

  product: "Torq — Robot Learning Data Infrastructure"
  tagline: "Turn data into motion"
  one_liner: >
    The pre-deployment data infrastructure for robot learning — from raw
    teleoperation recordings to ML-ready training DataLoaders in 5 lines of code.
  install: "pip install torq-robotics"
  import: "import torq as tq"
  cloud: "https://www.datatorq.ai"
  stage: "R1 Alpha — SDK complete, entering user validation"
  company: "Centroid Foundry Pty Ltd"

  positioning: >
    Alloy is Datadog for deployed robots. Torq is Weights & Biases for robot
    learning. They monitor production. We optimize training. Both are needed,
    neither replaces the other.

  problem: >
    40–60% of robotics engineering time is spent on data pipeline plumbing —
    format conversion, quality filtering, dataset balancing — using 3–6
    incompatible tools. No single system manages the complete pre-deployment
    lifecycle: raw recordings → structured episodes → quality-scored datasets
    → ML training DataLoaders.

  solution: >
    Torq owns the full workflow. tq.ingest() handles any format. tq.quality.score()
    automatically filters bad demonstrations. tq.compose() builds training datasets
    with one API call. tq.DataLoader() streams directly to PyTorch or JAX. The
    250-line custom data loading script every PhD student maintains becomes
    5 lines of Torq.

  target_users:
    primary: "Robot learning researchers (academic labs, CoRL/RSS/ICRA)"
    secondary: "ML engineers at robotics startups (Series A, manipulation/locomotion)"
    tertiary: "Sim-to-real research leads managing synthetic + real data pipelines"

  status:
    sdk_complete: true
    sdk_tests_passing: 123
    sdk_loc: 3467
    real_world_users: 0
    revenue: "$0 (pre-revenue)"
    next_milestone: "5 active SDK users on real data — Phase 1 gate"

# ══════════════════════════════════════════════════════════════════════════════
# 0.1 SUCCESS CRITERIA
# ══════════════════════════════════════════════════════════════════════════════

success_criteria:

  philosophy: >
    Success is defined by evidence of real user value, not features shipped.
    Each phase gate must be satisfied before proceeding to the next phase.
    All criteria are observable and verifiable — not self-assessed.

  phase_1:
    name: "SDK Validation"
    timeline: "M0–3"
    theme: "Does the SDK work on real data and does quality scoring mean something?"
    gate_criteria:
      - id: "SC-1.1"
        criterion: >
          5 or more users have run tq.ingest() on their own real datasets
          (not synthetic fixtures) without hitting an unrecoverable error.
        measurement: "Confirmed via pair-programming session notes or user-reported."
        why: >
          Validates the SDK handles real-world messy data, not just
          clean synthetic test fixtures.
      - id: "SC-1.2"
        criterion: >
          At least 2 users have run tq.quality.score() and confirmed that
          the score ordering matches their own intuition about which episodes
          are good and which are bad.
        measurement: >
          Direct observation during pair-programming: user sees scores,
          ranks episodes themselves, overlap >= 70%.
        why: >
          Quality scoring that doesn't match human judgment is worse than
          no scoring — it actively misleads. This is the most critical
          validation in Phase 1.
      - id: "SC-1.3"
        criterion: >
          At least 1 user has run the full 5-line workflow end-to-end:
          ingest → score → compose → DataLoader → training loop iteration.
        measurement: "Confirmed via session observation or user-shared code snippet."
        why: "The README promise. If no real user completes this flow, R1 is not validated."
      - id: "SC-1.4"
        criterion: >
          Zero unrecoverable errors on MCAP or HDF5 files from real
          teleoperation hardware (ALOHA-2, Franka, or equivalent).
        measurement: >
          All errors during pair-programming sessions are recoverable with a
          clear error message. No silent data corruption.
        why: "First impression for academic users. One silent failure destroys trust permanently."

  phase_2:
    name: "Cloud MVP"
    timeline: "M3–7"
    theme: "Will anyone pay for the cloud platform?"
    gate_criteria:
      - id: "SC-2.1"
        criterion: "3 or more paying customers at any pricing tier above free."
        measurement: "Stripe or equivalent payment confirmation."
        why: "Revenue is the only proof that cloud value is real. Waitlist signups do not count."
      - id: "SC-2.2"
        criterion: >
          A new user can go from pip install torq-robotics to viewing a quality
          report on datatorq.ai in under 10 minutes.
        measurement: "Timed observation of 3 onboarding sessions. Median under 10 minutes."
        why: "Onboarding time is the strongest predictor of activation rate for developer tools."
      - id: "SC-2.3"
        criterion: >
          At least 1 dataset has been shared between two users via the cloud
          platform and used in a downstream training run.
        measurement: "Confirmed via platform activity log."
        why: "Validates the core multi-player value proposition that no local SDK can replicate."
      - id: "SC-2.4"
        criterion: >
          At least 10 unique users have clicked through a gravity well prompt
          to datatorq.ai.
        measurement: "Confirmed via datatorq.ai analytics."
        why: "Validates gravity wells are generating conversion traffic, not printing to ignored terminals."

  phase_3:
    name: "Commercial Traction"
    timeline: "M7–12"
    theme: "Can we grow beyond academics into startups?"
    gate_criteria:
      - id: "SC-3.1"
        criterion: "$10,000 MRR from paying customers."
        measurement: "Monthly recurring revenue from Stripe."
        why: "Minimum signal that this is a real business."
      - id: "SC-3.2"
        criterion: "Net Promoter Score > 40 across active users."
        measurement: "In-product NPS survey, minimum 20 respondents."
        why: "NPS > 40 is the threshold for a product users actively recommend."
      - id: "SC-3.3"
        criterion: >
          3 or more robotics startup customers (distinct from academic users)
          using Torq in a production training pipeline.
        measurement: "Confirmed via customer interviews."
        why: "Academic adoption validates the tool. Startup adoption validates the business model."

  phase_4:
    name: "Scale and Defend"
    timeline: "M12–18"
    gate_criteria:
      - id: "SC-4.1"
        criterion: "$30,000–80,000 MRR."
        measurement: "Monthly recurring revenue from Stripe."
      - id: "SC-4.2"
        criterion: >
          At least 1 enterprise customer in active contract negotiation or
          signed agreement.
        measurement: "Signed LOI or contract."
        why: "Enterprise pipeline validates the upper pricing tier and on-premise deployment path."
      - id: "SC-4.3"
        criterion: >
          Alloy integration live: production robot data flowing from Alloy into
          Torq for retraining without manual export.
        measurement: "Integration confirmed by at least 1 mutual customer."
        why: "Transforms the competitive relationship from threat to complementary partnership."

