# 2.1 USER JOURNEYS
# ══════════════════════════════════════════════════════════════════════════════

user_journeys:

  philosophy: >
    User journeys document the realistic step-by-step flow a persona takes
    through the product. Each step is a potential failure point, a design
    decision, and an acceptance test. Journeys reveal where onboarding breaks
    before users do.

  - id: "UJ-01"
    persona: "Dr. Maya Chen"
    scenario: "First use — MCAP recordings to training-ready dataset"
    entry_point: >
      Maya has 3 hours of ALOHA-2 teleoperation recordings as MCAP files. She
      wants to filter out bad demonstrations and build a clean dataset for ACT
      policy training. She has heard about Torq from a lab colleague.
    success_state: >
      Maya's PyTorch DataLoader is iterating over a quality-filtered dataset
      and her training loop is running. She has seen quality scores and trusts them.

    steps:
      - step: 1
        action: "pip install torq-robotics"
        expectation: "Installs cleanly. No conflicts with ROS 2 environment."
        failure_risk: >
          Dependency conflict with existing numpy/opencv versions in her
          conda environment. Most common first-failure point for robotics researchers.
        success_signal: "No errors. torq version printed."
        design_requirement: >
          Core dependencies must be compatible with ROS 2 Humble/Iron.
          Conflicts must surface a helpful error message naming the conflicting package.

      - step: 2
        action: "import torq as tq"
        expectation: "Imports in under 2 seconds."
        failure_risk: "Slow import due to eager loading of heavy dependencies."
        success_signal: "Import completes. tq.__version__ prints correctly."
        design_requirement: >
          No torch, jax, or opencv imports at module level. Lazy loading only.
          import torq must complete in under 2 seconds on a standard laptop.

      - step: 3
        action: "episodes = tq.ingest('./recordings/', format='auto')"
        expectation: "Progress bar. Auto-detects MCAP. Reports episode count. Completes."
        failure_risk: >
          Silent failure on malformed MCAP messages. Wrong episode boundary
          detection producing 1 giant episode instead of many discrete ones.
        success_signal: >
          "Ingested 47 episodes from 3 MCAP files (00:03:12 total duration)"
        design_requirement: >
          Progress bar via tqdm for directories with more than 1 file.
          Episode count and duration reported on completion. Failed files log
          a warning and continue — never silently drop data.

      - step: 4
        action: "episodes[0]  — Maya inspects the first episode"
        expectation: "Readable summary without writing custom inspection code."
        failure_risk: "Episode repr shows memory address instead of useful summary."
        success_signal: >
          Episode repr prints:
          Episode(id='ep_001', duration=4.2s, timesteps=210,
          observations=['joint_pos', 'wrist_cam'], actions=['joint_vel'])
        design_requirement: >
          Episode.__repr__ must include duration, timestep count, and modality
          list. Readable without any method calls.

      - step: 5
        action: "scored = tq.quality.score(episodes)"
        expectation: "Progress bar. Under 60 seconds for 47 episodes. Scores attached."
        failure_risk: "No progress feedback. Scores all identical (bug). NaN on short episodes."
        success_signal: "Progress bar: 'Scoring episodes: 47/47 [00:38]'. scored[0].quality.overall = 0.74"
        design_requirement: >
          Progress bar required. Episodes under 10 timesteps return a warning
          and score of None, not NaN. Scores must vary across a realistic episode set.

      - step: 6
        action: "Maya looks at the score distribution"
        expectation: "Score ordering matches her intuition about which episodes are good."
        failure_risk: >
          Scores feel random. Her intuitively-bad episodes score high. She loses
          trust in the system entirely. This step is the make-or-break moment.
        success_signal: >
          The episodes she recalls as bad (dropped object) score in the bottom 20%.
          Gravity well GW-01 fires: "Compare against community benchmarks
          → https://www.datatorq.ai"
        design_requirement: "SC-1.2 must be validated here. GW-01 fires after scoring completes."

      - step: 7
        action: "dataset = tq.compose(scored, task='pick', quality_min=0.75)"
        expectation: "Returns filtered dataset. Reports how many episodes passed threshold."
        failure_risk: "quality_min=0.75 filters out everything. Silent empty dataset returned."
        success_signal: >
          "Composed dataset: 31 episodes (16 filtered below quality_min=0.75)"
          Gravity well GW-02 fires: "Share this dataset with your lab → https://www.datatorq.ai"
        design_requirement: >
          Warn loudly if composition returns fewer than 5 episodes.
          Always report how many were filtered and why.

      - step: 8
        action: "loader = tq.DataLoader(dataset, batch_size=32) — training loop"
        expectation: "Drop-in for PyTorch DataLoader. First batch within 5 seconds."
        failure_risk: "Collation error due to variable-length episodes. Shape mismatch."
        success_signal: "First batch loads. obs shape: [32, 210, 14]. Training loop runs."
        design_requirement: >
          Default collate_fn handles variable-length episodes via padding or truncation.
          Error messages on shape mismatch must name the offending episode and modality.

    journey_insights:
      highest_risk_step: 6
      rationale: >
        If quality scores don't match Maya's intuition, she abandons the product.
        Every other step is recoverable. Step 6 is not.
      onboarding_target: "Steps 1–8 completed in under 20 minutes with real MCAP files on hand."
      gravity_wells_triggered: ["GW-01", "GW-02"]

  - id: "UJ-02"
    persona: "Jake Torres"
    scenario: "Recurring use — integrating Torq into an existing ML pipeline"
    entry_point: >
      Jake's startup collects 20–30 ALOHA-2 demonstrations per day. He currently
      runs a 340-line custom Python script to load data into his training loop.
      He wants to replace it with something maintainable.
    success_state: >
      tq.ingest() and tq.DataLoader() are integrated into Jake's CI training
      pipeline. New demonstrations are automatically ingested and quality-gated
      each night. Jake trusts the quality gate enough to stop manually reviewing
      every episode.

    steps:
      - step: 1
        action: "Jake reads the README. Runs the 5-line example."
        success_signal: "Example runs without modification on his data."
        design_requirement: "README example must work copy-paste with any MCAP file. No config required."

      - step: 2
        action: "Jake replaces his 340-line script with tq.ingest() + tq.DataLoader()"
        success_signal: "Training output is identical. Script reduced to 8 lines."
        failure_risk: >
          Subtle data differences between Torq's episode representation and
          Jake's custom loader cause training divergence.
        design_requirement: >
          Numerical determinism: same input files must produce identical tensors
          as a correctly-implemented custom loader.

      - step: 3
        action: "Jake sets up nightly ingestion: tq ingest ./daily_recordings/"
        success_signal: "CLI runs headlessly. Exit code 0 on success, non-zero on error."
        design_requirement: >
          CLI must be scriptable: machine-readable output flag (--json),
          non-zero exit on any ingestion failure. Suitable for cron and CI.

      - step: 4
        action: "Jake queries across 2 weeks of episodes"
        success_signal: >
          tq.query(task='pick', date_after='2026-02-01', quality_min=0.8)
          returns in under 1 second for 5,000 episodes.
        failure_risk: "Query scans all parquet files sequentially. Latency unacceptable at volume."
        design_requirement: >
          JSON index must accelerate task, date, quality, embodiment queries.
          Full scan only as fallback.

      - step: 5
        action: "Jake hits 50GB of local data. Storage becomes a problem."
        success_signal: >
          Gravity well GW-03 fires: "Stream directly without downloading
          → https://www.datatorq.ai"
        design_requirement: >
          GW-03 fires when dataset size exceeds 50GB or DataLoader memory
          usage exceeds available RAM.

    journey_insights:
      highest_risk_step: 2
      rationale: >
        Jake will compare training results against his existing script.
        Any numerical difference makes him distrust Torq and revert.
        Determinism is non-negotiable.
      gravity_wells_triggered: ["GW-03", "GW-05"]

# ══════════════════════════════════════════════════════════════════════════════
# 3. COMPETITIVE DEFENSE ARCHITECTURE
# ══════════════════════════════════════════════════════════════════════════════

competitive_defense:

  tier_1:
    name: "Overlap Zone"
    description: "Alloy Can Match Within 6 Months"
    strategic_principle: >
      Don't fight Alloy on their home turf. Accept feature parity at the
      ingestion layer but immediately diverge into training-specific processing.
      The MCAP file enters the same door but exits as a fundamentally different
      data product.
    capabilities:
      - capability: "MCAP/ROS Ingestion"
        alloy_state: "Production-ready. Direct upload, auto-parsing of sensor topics."
        torque_strategy: >
          Match but don't compete. Torque ingests MCAP but enriches with episode
          segmentation and quality metadata during ingestion. Same front door,
          different processing.
      - capability: "NL Data Search"
        alloy_state: "Core differentiator. 'Search all your robot data in plain English.' Similarity search across images and time-series."
        torque_strategy: >
          Match with training-specific semantics. Torque search understands 'find
          all successful grasp demonstrations with quality > 0.8' not just 'find
          sensor spikes.'
      - capability: "Multi-Modal Viz"
        alloy_state: "Unified image, time-series, log viewer with frame-by-frame analysis."
        torque_strategy: >
          Don't compete on general viz. Defer to Foxglove/Rerun for raw data viz.
          Torque visualizes episode quality, action distributions, and training
          dataset composition.

  tier_2:
    name: "Differentiation Zone"
    description: "Alloy Would Need 12–18 Months"
    capabilities:
      - capability: "Episode-First Data Model"
        why_alloy_cant: >
          Alloy's ontology is missions/scenarios. Retrofitting episode
          segmentation requires rewriting their data model. Episodes have
          action-observation pairs, timestep alignment, and demonstration
          boundaries that missions don't.
        torque_implementation: >
          P0. Every data object in Torque is an episode. Episodes contain aligned
          action-observation pairs with per-timestep quality scores. All downstream
          features operate on episodes, not raw sensor streams.
      - capability: "Quality Scoring Engine"
        why_alloy_cant: >
          Alloy detects anomalies (sensor spikes, GPS loss) which is fundamentally
          different from scoring demonstration quality (smoothness, kinematic
          feasibility, task completion). They'd need new ML models and domain expertise.
        torque_implementation: >
          P0. Automated quality scoring across dimensions: trajectory smoothness,
          action consistency, task completion, gripper engagement, kinematic
          feasibility. Quality gates prevent bad demonstrations from entering
          training datasets.
      - capability: "Format Unification Layer"
        why_alloy_cant: >
          Alloy handles MCAP/ROS. The robotics training ecosystem uses 6+
          incompatible formats: HDF5 (robomimic), TFRecord/RLDS (OXE),
          Parquet+MP4 (LeRobot), Zarr (Diffusion Policy), EBML (Robo-DM). Alloy
          has no incentive to support training-specific formats.
        torque_implementation: >
          P0. Universal ingest from all 6 major formats. Canonical episode
          representation internally. Export to any target format. This is the
          integration moat: teams that store data in Torque's canonical format
          have switching costs.

  tier_3:
    name: "Deep Moat"
    description: "Alloy Cannot Reach Without Becoming Torque"
    capabilities:
      - capability: "Dataset Composition Engine"
        why_structurally_unreachable: >
          Requires understanding of training data distribution theory: stratified
          sampling, quality-weighted selection, task coverage analysis. Alloy's
          'export scenario as training data' is file export, not composition.
        torque_implementation: >
          P0. SQL-like query builder for constructing training datasets.
          tq.compose(tasks=['pick','place'], quality_min=0.8,
          balance='stratified', sim_ratio=0.3). Visualize dataset composition
          with distribution heatmaps.
      - capability: "Sim-to-Real Mixing"
        why_structurally_unreachable: >
          Alloy has zero simulation integration. Their customers are deploying
          real robots, not training in Isaac Sim. Adding sim data support would
          require an entirely new product surface.
        torque_implementation: >
          P1. Ingest synthetic demonstrations from Isaac Sim, MuJoCo, Robosuite.
          Tag sim vs. real provenance. Automated mixing ratio optimization. Domain
          gap analysis between sim and real episodes.
      - capability: "Training Pipeline Integration"
        why_structurally_unreachable: >
          Alloy stops at 'here's your data.' They have no concept of PyTorch
          DataLoaders, JAX pipelines, policy checkpoints, or experiment tracking.
          This is a different product category.
        torque_implementation: >
          P0. Native PyTorch DataLoader (tq.DataLoader), JAX tf.data pipeline,
          W&B integration. Policy training tracking with dataset lineage: trace
          any model back to exact episodes used.
      - capability: "Cross-Embodiment Normalization"
        why_structurally_unreachable: >
          Alloy handles fleets of identical robots. They have no concept of
          cross-embodiment: normalizing action spaces across different robot
          morphologies for unified training.
        torque_implementation: >
          P1. Task x Embodiment heatmap. Automatic action space normalization.
          Cross-embodiment dataset construction for foundation model training.
      - capability: "Policy Experiment Tracking"
        why_structurally_unreachable: >
          Would require Alloy to build an entirely new experiment tracking system.
          This is W&B territory, not operational monitoring.
        torque_implementation: >
          P1. Full experiment lifecycle: dataset version → training config →
          policy checkpoint → evaluation metrics → deployment approval. Complete
          audit trail.

# ══════════════════════════════════════════════════════════════════════════════
# 4. FUNCTIONAL REQUIREMENTS
# ══════════════════════════════════════════════════════════════════════════════
#
# Priority assignments reflect competitive defensibility, not just user value.
# All P0 requirements must ship in v0.1 (Alpha).
# Acceptance criteria are testable conditions for each requirement.

functional_requirements:

  # ──────────────────────────────────────────────────────────────────────────
  # 4.1 Data Ingestion & Episode Extraction (Tier 1–2)
  # ──────────────────────────────────────────────────────────────────────────

  data_ingestion:
    section: "4.1"
    tier_range: "Tier 1–2"

    requirements:
      - id: "DI-01"
        priority: "P0"
        requirement: "Ingest MCAP/ROS2 bag files with automatic topic discovery and schema extraction"
        acceptance_criteria: >
          Successfully ingests MCAP files from ROS 2, extracts all topics, and
          creates episode objects within 5s for <1GB files. Auto-discovers image,
          joint state, and action topics.
        tier: 1
        alloy_overlap: true

      - id: "DI-02"
        priority: "P0"
        requirement: "Ingest HDF5 (robomimic), TFRecord/RLDS, Parquet+MP4 (LeRobot), Zarr, EBML formats"
        acceptance_criteria: >
          Imports any LeRobot v3.0 dataset from HuggingFace Hub or local path.
          Handles standard robomimic HDF5 with nested obs/action groups up to
          50GB. Imports OXE datasets without TensorFlow dependency. Handles Zarr
          v2 arrays with nested groups.
        tier: 2
        alloy_overlap: false

      - id: "DI-03"
        priority: "P0"
        requirement: "Automatic episode boundary detection from continuous teleoperation streams (task start/stop, gripper open/close, velocity thresholds)"
        acceptance_criteria: >
          Detects episode boundaries with >90% accuracy on standard teleoperation
          streams. Supports configurable boundary signals: gripper state changes,
          velocity thresholds, manual markers. Segments a 1-hour continuous stream
          into episodes in <30s.
        tier: 2
        alloy_overlap: false

      - id: "DI-04"
        priority: "P0"
        requirement: "Generate canonical episode representation with aligned action-observation pairs, per-timestep metadata, and provenance tracking"
        acceptance_criteria: >
          Episode stores all modalities (images, joint states, actions,
          force-torque) with nanosecond timestamps and arbitrary metadata. Schema
          is extensible (user-defined fields), validated on ingest, queryable via
          SQL-like interface. Source file provenance tracked.
        tier: 2
        alloy_overlap: false

      - id: "DI-05"
        priority: "P1"
        requirement: "SDK-based streaming ingestion: tq.record(episode) for real-time capture during teleoperation"
        acceptance_criteria: >
          Subscribes to configurable ROS 2 topics, creates episodes in real-time
          with <100ms latency. Supports pause/resume and episode tagging during
          capture. Auto-triggers quality scoring on episode completion.
        tier: 2
        alloy_overlap: false

      - id: "DI-06"
        priority: "P1"
        requirement: "Bulk import with progress tracking and validation reporting"
        acceptance_criteria: >
          tq ingest ./data/ auto-detects format, processes in parallel across CPU
          cores, reports progress bar and per-file error summary. Handles
          directories with 1000+ files without memory overflow.
        tier: 1
        alloy_overlap: true

      - id: "DI-07"
        priority: "P2"
        requirement: "Automatic format detection and conversion on upload"
        acceptance_criteria: >
          Correctly identifies file format with >95% accuracy across all 6
          supported formats. Falls back to user prompt on ambiguous files. Logs
          format detection confidence.
        tier: 2
        alloy_overlap: false

      - id: "DI-08"
        priority: "P2"
        requirement: "Integration with teleoperation hardware APIs (ALOHA, Gello, UMI) for direct capture"
        acceptance_criteria: >
          Provides hardware-specific capture adapters. ALOHA integration captures
          bimanual joint states + wrist cameras at 50Hz. Gello integration
          captures joint positions at 100Hz. Configurable observation/action
          mapping per hardware.
        tier: 3
        alloy_overlap: false

  # ──────────────────────────────────────────────────────────────────────────
  # 4.2 Episode Quality Management (Tier 2–3 — Core Moat)
  # ──────────────────────────────────────────────────────────────────────────

  quality_management:
    section: "4.2"
    tier_range: "Tier 2–3 — Core Moat"

    requirements:
      - id: "QM-01"
        priority: "P0"
        requirement: "Automated quality scoring: trajectory smoothness (jerk analysis), action consistency (distribution analysis), task completion detection"
        acceptance_criteria: >
          Assigns 0.0–1.0 quality score per episode across 4+ dimensions.
          Smoothness score based on jerk magnitude analysis. Action consistency
          via statistical distribution analysis. Scores correlate with human
          quality judgments (>0.7 Spearman's ρ). Processes 100 episodes in <60s.
        tier: 2
        alloy_overlap: false

      - id: "QM-02"
        priority: "P0"
        requirement: "Per-episode quality report with dimension breakdown and overall score (0.0–1.0)"
        acceptance_criteria: >
          Report includes per-dimension scores (smoothness, consistency,
          completion, feasibility), overall weighted score, timestep-level quality
          heatmap, and flagged anomaly regions. Exportable as JSON and viewable
          in dashboard.
        tier: 2
        alloy_overlap: false

      - id: "QM-03"
        priority: "P0"
        requirement: "Quality gates: configurable thresholds that prevent low-quality episodes from entering curated datasets"
        acceptance_criteria: >
          Define per-dataset quality thresholds (e.g., quality_min=0.75,
          smoothness_min=0.6). Episodes below threshold are auto-rejected with
          reason codes. Gate configuration stored with dataset version metadata.
          Override requires explicit flag.
        tier: 3
        alloy_overlap: false

      - id: "QM-04"
        priority: "P0"
        requirement: "Quality distribution visualization across dataset with outlier detection"
        acceptance_criteria: >
          Interactive histogram/violin plots of quality scores across dataset.
          Automatic outlier detection (>2σ or IQR-based). Click-to-inspect any
          episode from distribution plot. Supports filtering by task, embodiment,
          operator.
        tier: 3
        alloy_overlap: false

      - id: "QM-05"
        priority: "P1"
        requirement: "Comparative quality analysis: before/after quality trends as operators improve"
        acceptance_criteria: >
          Time-series plots showing quality trends per operator over collection
          sessions. Statistical significance test for quality improvement.
          Exportable progress reports for team leads.
        tier: 3
        alloy_overlap: false

      - id: "QM-06"
        priority: "P1"
        requirement: "Kinematic feasibility scoring: detect physically impossible or unsafe demonstrations"
        acceptance_criteria: >
          Validates joint limits, velocity limits, and collision constraints
          against robot URDF. Flags episodes with >5% timesteps exceeding
          physical limits. Supports ALOHA-2, Franka, UR5 URDFs out of box.
          Custom URDF upload supported.
        tier: 3
        alloy_overlap: false

      - id: "QM-07"
        priority: "P2"
        requirement: "Custom quality metric plugins: user-defined scoring functions via SDK"
        acceptance_criteria: >
          tq.quality.register(name, fn) accepts any Python callable that takes an
          episode and returns 0.0–1.0 score. Custom metrics are computed alongside
          built-in metrics and stored in episode metadata. Plugin discovery via
          entry points.
        tier: 3
        alloy_overlap: false

      - id: "QM-08"
        priority: "P2"
        requirement: "Quality-based operator leaderboards for teleoperation team management"
        acceptance_criteria: >
          Ranked operator list by average quality score, episodes collected, and
          improvement rate. Filterable by task and time period. Anonymization
          option for sensitive deployments.
        tier: 3
        alloy_overlap: false

  # ──────────────────────────────────────────────────────────────────────────
  # 4.3 Dataset Composition Engine (Tier 3 — Deepest Moat)
  # ──────────────────────────────────────────────────────────────────────────

  dataset_composition:
    section: "4.3"
    tier_range: "Tier 3 — Deepest Moat"

    requirements:
      - id: "DC-01"
        priority: "P0"
        requirement: "SQL-like query builder for training dataset construction: filter by task, quality, embodiment, environment, provenance"
        acceptance_criteria: >
          tq.compose(tasks=['pick','place'], quality_min=0.8,
          embodiment='aloha2') returns composed dataset in <5s for 100K episode
          pool. Supports AND/OR/NOT logic, range filters, regex on metadata
          fields. Query is stored as reproducible recipe.
        tier: 3
        alloy_overlap: false

      - id: "DC-02"
        priority: "P0"
        requirement: "Stratified sampling with configurable balance: equal task distribution, quality-weighted selection, embodiment coverage"
        acceptance_criteria: >
          balance='stratified' produces equal episode counts per task (±5%).
          balance='quality_weighted' over-samples high-quality episodes.
          balance='embodiment_equal' ensures cross-robot coverage. Sampling is
          deterministic given same seed.
        tier: 3
        alloy_overlap: false

      - id: "DC-03"
        priority: "P0"
        requirement: "Dataset versioning with full provenance: every dataset records exact episodes, filters, and composition rules used"
        acceptance_criteria: >
          Create named versions (v1, v2, ...). View diffs between versions
          (episodes added/removed/modified). Restore any version. Full
          provenance: exact query, filters, sampling config, source episodes
          stored immutably. tq.diff('v1', 'v2') shows changes.
        tier: 3
        alloy_overlap: false

      - id: "DC-04"
        priority: "P1"
        requirement: "Sim-to-real mixing with configurable ratios: tq.compose(sim_ratio=0.3, domain_gap_max=0.5)"
        acceptance_criteria: >
          Accepts sim_ratio parameter (0.0–1.0) controlling synthetic data
          proportion. domain_gap_max filters sim episodes by computed domain gap
          score. Provenance tags distinguish sim vs. real in all downstream
          analysis. Supports Isaac Sim, MuJoCo, Robosuite sources.
        tier: 3
        alloy_overlap: false

      - id: "DC-05"
        priority: "P1"
        requirement: "Dataset composition visualization: distribution heatmaps, coverage gaps, diminishing returns curves"
        acceptance_criteria: >
          Task x Embodiment heatmap showing episode counts and quality per cell.
          Coverage gap analysis highlights underrepresented combinations.
          Diminishing returns curve shows predicted marginal value of additional
          episodes per task. Interactive, filterable.
        tier: 3
        alloy_overlap: false

      - id: "DC-06"
        priority: "P1"
        requirement: "Incremental dataset updates: add new episodes to existing datasets without full recomposition"
        acceptance_criteria: >
          tq.dataset.append(new_episodes, validate=True) adds episodes matching
          existing quality gates and composition rules. Creates new version
          automatically. Validates schema compatibility. Rejects incompatible
          episodes with descriptive errors.
        tier: 3
        alloy_overlap: false

      - id: "DC-07"
        priority: "P2"
        requirement: "Auto-composition: ML-driven suggestions for optimal dataset composition based on target task performance"
        acceptance_criteria: >
          Given target task and current policy performance, suggests episodes to
          add/remove. Recommends optimal sim-to-real ratio and task balance.
          Validated: auto-composed datasets match or exceed human-curated datasets
          on 3+ benchmark tasks.
        tier: 3
        alloy_overlap: false

      - id: "DC-08"
        priority: "P2"
        requirement: "A/B dataset comparison: side-by-side composition analysis to understand what training data differences drive performance"
        acceptance_criteria: >
          tq.compare('dataset_a', 'dataset_b') shows side-by-side distributions,
          quality stats, episode overlap, and unique contributions. Correlates
          dataset differences with policy performance deltas when training metrics
          are available.
        tier: 3
        alloy_overlap: false

  # ──────────────────────────────────────────────────────────────────────────
  # 4.4 ML Pipeline Integration (Tier 3 — Deepest Moat)
  # ──────────────────────────────────────────────────────────────────────────

  ml_pipeline_integration:
    section: "4.4"
    tier_range: "Tier 3 — Deepest Moat"

    requirements:
      - id: "ML-01"
        priority: "P0"
        requirement: "Native PyTorch DataLoader: tq.DataLoader(dataset='pick_v3', batch_size=32, shuffle=True)"
        acceptance_criteria: >
          Drop-in replacement for standard PyTorch DataLoader. Supports
          multi-worker loading (num_workers), prefetching, and pin_memory.
          Compatible with DistributedDataParallel. First batch available within
          5s for local datasets, 30s for cloud. Saturates GPU training at 1000+
          episodes/second.
        tier: 3
        alloy_overlap: false

      - id: "ML-02"
        priority: "P0"
        requirement: "JAX/Flax tf.data pipeline integration"
        acceptance_criteria: >
          Provides JAX-compatible iterator with automatic batching, prefetching,
          and device placement. Supports jax.pmap for multi-GPU. Zero-copy where
          possible via Arrow memory mapping.
        tier: 3
        alloy_overlap: false

      - id: "ML-03"
        priority: "P0"
        requirement: "W&B, MLflow, and TensorBoard integration for experiment tracking with dataset lineage"
        acceptance_criteria: >
          Auto-logs dataset ID, version, composition query, quality statistics,
          and episode count as experiment metadata at training start. Supports
          W&B Artifacts, MLflow tracking, and TensorBoard HParams. One-line
          setup: tq.integrations.wandb.init().
        tier: 3
        alloy_overlap: false

      - id: "ML-04"
        priority: "P1"
        requirement: "Policy checkpoint registry with dataset provenance: trace any model to exact training episodes"
        acceptance_criteria: >
          tq.checkpoint.save(policy, dataset='pick_v3') stores policy weights
          linked to dataset version. tq.trace('policy_v3') returns complete
          lineage: dataset version, composition rules, source episodes, training
          config, evaluation metrics. Searchable registry.
        tier: 3
        alloy_overlap: false

      - id: "ML-05"
        priority: "P1"
        requirement: "Training job orchestration: launch training runs directly from composed datasets"
        acceptance_criteria: >
          tq.train(dataset='pick_v3', config='act_policy.yaml') launches training
          job with correct DataLoader configuration. Supports local and cloud
          (SLURM, K8s) backends. Auto-logs results to experiment tracker.
        tier: 3
        alloy_overlap: false

      - id: "ML-06"
        priority: "P2"
        requirement: "Automated evaluation pipeline: run trained policies against held-out episodes"
        acceptance_criteria: >
          tq.evaluate(policy, holdout='pick_eval_v1') runs policy against
          held-out episodes and reports success rate, trajectory similarity, and
          quality delta. Supports sim evaluation via Isaac Lab integration.
        tier: 3
        alloy_overlap: false

      - id: "ML-07"
        priority: "P2"
        requirement: "Cross-embodiment action space normalization for foundation model training"
        acceptance_criteria: >
          Automatic normalization of heterogeneous action spaces to common
          representation. Supports joint-space, task-space, and end-effector
          representations. Validated: normalized cross-embodiment datasets train
          policies that transfer across 3+ robot types.
        tier: 3
        alloy_overlap: false

      - id: "ML-08"
        priority: "P3"
        requirement: "Distributed training data serving: optimized data loading for multi-GPU/multi-node training"
        acceptance_criteria: >
          Distributed data serving with locality-aware shard assignment. Supports
          8+ GPU nodes. Data loading does not become bottleneck up to 64 workers.
          Validated on A100 and H100 clusters.
        tier: 3
        alloy_overlap: false

  # ──────────────────────────────────────────────────────────────────────────
  # 4.5 Query Engine & Data Discovery (Tier 1–2)
  # ──────────────────────────────────────────────────────────────────────────

  query_engine:
    section: "4.5"
    tier_range: "Tier 1–2"

    requirements:
      - id: "QE-01"
        priority: "P0"
        requirement: "Natural language search with training-specific semantics: 'successful grasps with quality > 0.8 on ALOHA-2'"
        acceptance_criteria: >
          Converts natural language to structured queries with >85% accuracy on
          common patterns. Handles training-specific terms (quality, success,
          embodiment, task) that Alloy's operational NL search cannot. Response
          time <2s. Supports follow-up refinement.
        tier: "1+"
        alloy_overlap: "partial"

      - id: "QE-02"
        priority: "P0"
        requirement: "Structured query API: tq.query(task='pick', quality_min=0.8, embodiment='aloha2')"
        acceptance_criteria: >
          Returns matching episodes in <1s for 100K episodes. Supports chaining:
          tq.query(...).filter(...).sort(...).limit(n). Results are lazy-evaluated
          iterators. Index-accelerated on task, embodiment, quality, and date
          fields.
        tier: 2
        alloy_overlap: false

      - id: "QE-03"
        priority: "P1"
        requirement: "Task x Embodiment x Quality heatmap for dataset coverage analysis"
        acceptance_criteria: >
          Interactive 3D heatmap (task rows, embodiment columns, quality as color
          intensity). Cell click expands to episode list. Highlights cells with <N
          episodes as 'underrepresented.' Exportable as PNG and CSV. Updates in
          real-time as episodes are added.
        tier: 3
        alloy_overlap: false

      - id: "QE-04"
        priority: "P1"
        requirement: "Similar episode retrieval: 'find 50 episodes most similar to this successful grasp'"
        acceptance_criteria: >
          Returns top-K similar episodes based on visual or state embeddings with
          <500ms latency for 100K episodes. Similarity computed on observation
          embeddings (CLIP or custom). Configurable similarity metric (cosine, L2).
        tier: "1+"
        alloy_overlap: "partial"

      - id: "QE-05"
        priority: "P2"
        requirement: "Dataset gap analysis: 'what tasks/conditions are underrepresented in my training data?'"
        acceptance_criteria: >
          Analyzes current dataset composition against target distribution
          (user-defined or auto-inferred from task taxonomy). Reports top 5 gaps
          with specific collection recommendations. Integrates with composition
          engine to auto-fill gaps from available pool.
        tier: 3
        alloy_overlap: false

  # ──────────────────────────────────────────────────────────────────────────
  # 4.6 Collaboration & Cloud (Tier 1–2)
  # ──────────────────────────────────────────────────────────────────────────

  collaboration_cloud:
    section: "4.6"
    tier_range: "Tier 1–2"

    requirements:
      - id: "CC-01"
        priority: "P1"
        requirement: "Team workspace with role-based access control (admin, researcher, annotator)"
        acceptance_criteria: >
          Create workspaces, invite members via email, set per-dataset
          read/write/admin permissions. 3 default roles (admin, researcher,
          annotator) with configurable custom roles. Invite link expiration.
          Activity log per workspace.
        tier: 1
        alloy_overlap: true

      - id: "CC-02"
        priority: "P1"
        requirement: "Dataset sharing: publish curated datasets with documentation and quality reports"
        acceptance_criteria: >
          tq.publish(dataset, readme='...', license='CC-BY-4.0') creates
          shareable dataset page with auto-generated quality report, composition
          summary, and episode browser. Supports public and team-only visibility.
          DOI assignment for academic citation.
        tier: 2
        alloy_overlap: false

      - id: "CC-03"
        priority: "P2"
        requirement: "Episode annotation and review workflows (approve/reject/flag for re-collection)"
        acceptance_criteria: >
          Assign episodes to reviewers. Approve/reject/flag interface with reason
          codes. Batch annotation support. Review status tracked in episode
          metadata. Filter datasets by review status.
        tier: 2
        alloy_overlap: false

      - id: "CC-04"
        priority: "P2"
        requirement: "Cross-institution dataset federation for collaborative research"
        acceptance_criteria: >
          Federated queries across institutions without centralizing data. Each
          institution retains data ownership. Access governed by per-institution
          policies. Query results merge transparently. Supports HIPAA-compatible
          isolation for medical robotics.
        tier: 3
        alloy_overlap: false

      - id: "CC-05"
        priority: "P3"
        requirement: "Marketplace: share and discover community-contributed datasets (future monetization)"
        acceptance_criteria: >
          Public dataset directory with search, preview, and one-click import.
          Quality badges (verified, scored, annotated). Usage analytics for
          contributors. Revenue share model for premium datasets (15% platform fee).
        tier: 3
        alloy_overlap: false

  # ──────────────────────────────────────────────────────────────────────────
  # 4.7 Package & Distribution (Naming Spec)
  # ──────────────────────────────────────────────────────────────────────────

  package_distribution:
    section: "4.7"

    requirements:
      - id: "PD-01"
        priority: "P0"
        requirement: "SDK installable as 'pip install torq-robotics' with Python import 'import torq as tq'"
        acceptance_criteria: >
          pip install torq-robotics succeeds on Python 3.9+ with no extra flags.
          import torq as tq imports in under 2 seconds. tq.__version__ returns
          the current version string. The PyPI package name is torq-robotics.
          The Python module name is torq. No user ever types 'import torque'.
        tier: 1
        alloy_overlap: false

      - id: "PD-02"
        priority: "P0"
        requirement: "All SDK documentation, README examples, and acceptance criteria use 'import torq as tq'"
        acceptance_criteria: >
          grep -r 'import torque' in the repository returns zero matches.
          All code examples in docs, README, and CLI help text use
          'import torq as tq'. PyPI page shows correct install command.
        tier: 1
        alloy_overlap: false

  # ──────────────────────────────────────────────────────────────────────────
  # 4.8 Gravity Well SDK Requirements
  # ──────────────────────────────────────────────────────────────────────────

  gravity_well_sdk:
    section: "4.8"
    cloud_platform: "https://www.datatorq.ai"

    requirements:
      - id: "GW-SDK-01"
        priority: "P0"
        requirement: >
          After tq.quality.score() completes, print a gravity well prompt
          directing users to datatorq.ai for community benchmark comparison.
        acceptance_criteria: >
          Prompt fires on every successful quality.score() call. Text includes
          the computed score and the datatorq.ai URL. Fires after successful
          completion, never on error. Suppressible via tq.config.quiet=True.
        tier: 1
        maps_to: "GW-01"

      - id: "GW-SDK-02"
        priority: "P0"
        requirement: >
          After tq.compose() returns a non-empty dataset, print a gravity well
          prompt directing users to datatorq.ai for dataset sharing.
        acceptance_criteria: >
          Prompt fires on every successful compose() call that returns >0 episodes.
          Text includes dataset episode count and the datatorq.ai URL.
          Suppressible via tq.config.quiet=True.
        tier: 1
        maps_to: "GW-02"

      - id: "GW-SDK-03"
        priority: "P1"
        requirement: >
          When tq.DataLoader() is initialised on a dataset exceeding 50GB,
          print a gravity well prompt for cloud streaming.
        acceptance_criteria: >
          Prompt fires when dataset size > 50GB at DataLoader init time.
          Text explains the size and links to datatorq.ai.
          Suppressible via tq.config.quiet=True.
        tier: 1
        maps_to: "GW-03"

      - id: "GW-SDK-04"
        priority: "P0"
        requirement: >
          tq.cloud() prints a waitlist prompt and URL. Called explicitly or
          when any cloud-only keyword argument is passed (e.g. publish=True).
        acceptance_criteria: >
          tq.cloud() always prints the datatorq.ai URL and waitlist message.
          Cloud-only kwargs on local functions trigger the same message and
          do not raise an unhandled exception.
        tier: 1
        maps_to: "GW-04"

      - id: "GW-SDK-05"
        priority: "P1"
        requirement: >
          When tq.query() or tq.compose() returns fewer than 5 episodes,
          print a gravity well prompt for community dataset discovery.
        acceptance_criteria: >
          Prompt fires when result set < 5 episodes. Text includes the task
          and embodiment queried and links to datatorq.ai.
          Suppressible via tq.config.quiet=True.
        tier: 1
        maps_to: "GW-05"

      - id: "GW-SDK-06"
        priority: "P0"
        requirement: >
          All gravity well prompts use a single internal _gravity_well()
          helper with consistent formatting. Opt-in telemetry captures
          feature name and SDK version only.
        acceptance_criteria: >
          All 5 gravity wells produce output via the same helper function.
          Telemetry is opt-in: first prompt includes one-time consent request.
          Default is no telemetry. Preference stored in ~/.torq/config.toml.
          Telemetry captures: gravity well ID, timestamp, SDK version,
          Python version, OS platform. Never captures file paths, scores,
          or any user data.
        tier: 1
        maps_to: "GW-01 through GW-05"

# ══════════════════════════════════════════════════════════════════════════════
# 4.9 NON-FUNCTIONAL REQUIREMENTS
# ══════════════════════════════════════════════════════════════════════════════

non_functional_requirements:

  format_note: >
    Each NFR follows BMAD format: "The system shall [metric] [condition]
    [measurement method]." All NFRs are testable with specific criteria.

  # ── Performance ──────────────────────────────────────────────────────────

  performance:

    - id: "NFR-P01"
      category: "Performance"
      requirement: >
        The SDK shall ingest a 1GB MCAP file in under 10 seconds as measured
        by wall-clock time on a standard developer machine (16GB RAM, 4-core CPU,
        SSD storage).
      scope: "SDK — R1"

    - id: "NFR-P02"
      category: "Performance"
      requirement: >
        The system shall return metadata query results in under 1 second for
        datasets containing 100,000 or more episodes, as measured from query
        call to result returned.
      scope: "SDK — R1"

    - id: "NFR-P03"
      category: "Performance"
      requirement: >
        The PyTorch DataLoader shall sustain throughput of 1,000 or more
        episodes per second during training iteration, as measured by batch
        iteration wall-clock timing on a GPU-equipped machine.
      scope: "SDK — R1"

    - id: "NFR-P04"
      category: "Performance"
      requirement: >
        The cloud DataLoader shall deliver the first training batch within
        30 seconds of DataLoader initialisation for remotely-stored datasets,
        as measured from tq.DataLoader() call to first batch available.
      scope: "Cloud — R2"

    - id: "NFR-P05"
      category: "Performance"
      requirement: >
        The SDK shall complete import torq in under 2 seconds on a standard
        developer laptop, as measured by wall-clock time from Python import
        statement to module ready. No heavy dependencies loaded at import time.
      scope: "SDK — R1"

  # ── Scalability ───────────────────────────────────────────────────────────

  scalability:

    - id: "NFR-S01"
      category: "Scalability"
      requirement: >
        The system shall support datasets up to 10TB containing 1 million or
        more episodes without degradation in query performance below the
        NFR-P02 threshold, as validated by load testing.
      scope: "Cloud — R3"

    - id: "NFR-S02"
      category: "Scalability"
      requirement: >
        The cloud platform shall support 100 or more concurrent users per
        workspace without API response latency exceeding 500ms at the 95th
        percentile, as measured by APM monitoring.
      scope: "Cloud — R3"

    - id: "NFR-S03"
      category: "Scalability"
      requirement: >
        The cloud storage backend shall scale transparently to petabyte-scale
        data via S3/GCS without requiring application-level changes, as
        validated by architecture review and provider SLA documentation.
      scope: "Cloud — R4"

  # ── Reliability ───────────────────────────────────────────────────────────

  reliability:

    - id: "NFR-R01"
      category: "Reliability"
      requirement: >
        The cloud platform shall maintain 99.9% uptime during scheduled
        business hours as measured by cloud provider SLA monitoring and
        independent uptime tracking.
      scope: "Cloud — R2"

    - id: "NFR-R02"
      category: "Reliability"
      requirement: >
        The system shall provide 99.999999999% (11 nines) data durability
        for stored episodes via S3/GCS multi-region replication, as
        guaranteed by cloud provider SLA.
      scope: "Cloud — R2"

    - id: "NFR-R03"
      category: "Reliability"
      requirement: >
        The system shall encrypt all stored episode data at rest using
        AES-256 and all data in transit using TLS 1.3 minimum, validated
        by security audit before cloud launch.
      scope: "Cloud — R2"

    - id: "NFR-R04"
      category: "Reliability"
      requirement: >
        The SDK shall produce no silent data corruption. Any file that fails
        to parse must log a warning with the file path and error reason and
        continue processing remaining files, never dropping data silently.
        Validated by adversarial test fixtures (corrupt MCAP, truncated HDF5).
      scope: "SDK — R1"

    - id: "NFR-R05"
      category: "Reliability"
      requirement: >
        The cloud platform shall achieve SOC 2 Type II certification within
        18 months of commercial launch (target: M18), as evidenced by
        completed audit report.
      scope: "Cloud — R4"

  # ── Usability ─────────────────────────────────────────────────────────────

  usability:

    - id: "NFR-U01"
      category: "Usability"
      requirement: >
        A new user shall complete the full 5-line workflow (ingest → score →
        compose → DataLoader → training loop) in under 20 minutes from
        pip install, with real data on hand, as measured by timed observation
        during user validation sessions (UJ-01).
      scope: "SDK — R1"

    - id: "NFR-U02"
      category: "Usability"
      requirement: >
        Every SDK exception shall include a human-readable message stating
        what went wrong and what the user should do to resolve it. No bare
        exceptions. Validated by code review and edge case test suite.
      scope: "SDK — R1"

    - id: "NFR-U03"
      category: "Usability"
      requirement: >
        All CLI commands shall support a --json flag for machine-readable
        output and return non-zero exit codes on any failure, enabling
        headless use in CI/CD pipelines. Validated by CLI integration tests.
      scope: "SDK — R1"

  # ── Compatibility ─────────────────────────────────────────────────────────

  compatibility:

    - id: "NFR-C01"
      category: "Compatibility"
      requirement: >
        The SDK shall support Python 3.9 and above on Linux (primary),
        macOS (development), and Windows via WSL2 (limited support), as
        validated by CI matrix across all three platforms.
      scope: "SDK — R1"

    - id: "NFR-C02"
      category: "Compatibility"
      requirement: >
        The SDK shall support PyTorch 2.0 and above including
        DistributedDataParallel across multiple GPUs and nodes, as validated
        by integration tests on multi-GPU test hardware.
      scope: "SDK — R1"

    - id: "NFR-C03"
      category: "Compatibility"
      requirement: >
        The SDK shall support JAX 0.4 and above with jax.pmap for
        multi-device training, as validated by JAX-specific integration tests.
      scope: "SDK — R2 (P0 in serving layer)"

    - id: "NFR-C04"
      category: "Compatibility"
      requirement: >
        The SDK shall support ROS 2 distributions Humble (LTS), Iron, and
        Jazzy for MCAP ingestion, as validated by ingestion tests against
        each distribution's message schema.
      scope: "SDK — R1"

    - id: "NFR-C05"
      category: "Compatibility"
      requirement: >
        The SDK core (import torq as tq) shall function without torch,
        jax, or any ML framework installed. Framework imports occur only
        inside the serve/ layer and only when explicitly requested.
        Validated by install test with core dependencies only.
      scope: "SDK — R1"

# ══════════════════════════════════════════════════════════════════════════════
# 5. SYSTEM ARCHITECTURE
# ══════════════════════════════════════════════════════════════════════════════

system_architecture:

  design_principle: >
    Architecture designed with competitive defensibility as a first-class
    concern. Layers 1–2 overlap with Alloy. Layers 3–8 are Torque-specific and
    represent the defensible product surface.

  value_principle: >
    Value accretes upward. Layers 1–2 are table stakes. Layers 5–8 are where
    Torque creates irreplaceable value. The test is: 'Does this feature require
    understanding of robot learning, not just robot data?'

  stack:
    - layer: 8
      name: "Policy Pipeline"
      function: "Training orchestration, checkpoint registry, evaluation"
      alloy_overlap: "NONE"
      defensibility: "DEEP MOAT"
    - layer: 7
      name: "ML Integration"
      function: "DataLoaders, W&B/MLflow integration, experiment tracking"
      alloy_overlap: "NONE"
      defensibility: "DEEP MOAT"
    - layer: 6
      name: "Composition Engine"
      function: "Dataset construction, sim-to-real mixing, stratified sampling"
      alloy_overlap: "NONE"
      defensibility: "DEEP MOAT"
    - layer: 5
      name: "Quality Engine"
      function: "Episode scoring, quality gates, distribution analysis"
      alloy_overlap: "NONE"
      defensibility: "STRONG"
    - layer: 4
      name: "Query Engine"
      function: "NL search, structured queries, coverage heatmaps"
      alloy_overlap: "PARTIAL"
      defensibility: "MODERATE"
    - layer: 3
      name: "Episode Store"
      function: "Canonical episode format, versioning, provenance"
      alloy_overlap: "LOW"
      defensibility: "STRONG"
    - layer: 2
      name: "Format Bridge"
      function: "MCAP, HDF5, RLDS, LeRobot, Zarr, EBML conversion"
      alloy_overlap: "MCAP only"
      defensibility: "MODERATE"
    - layer: 1
      name: "Ingestion"
      function: "File upload, streaming capture, episode boundary detection"
      alloy_overlap: "HIGH"
      defensibility: "LOW"

  non_functional_requirements: "See dedicated Section 4.9 — Non-Functional Requirements"

  sdk_api_draft: |
    import torq as tq          # pip install torq-robotics

    # ── Connect ──
    client = tq.connect("https://app.datatorq.ai", api_key="tq_...")

    # ── Ingest (Tier 1-2: Same front door, different processing) ──
    episodes = tq.ingest("demo_session.mcap",
      auto_segment=True,       # Episode boundary detection
      quality_score=True,      # Inline quality scoring
      format='auto'            # MCAP, HDF5, RLDS, LeRobot, Zarr
    )

    # ── Quality (Tier 2-3: Core moat) ──
    report = tq.quality.score(episodes[0])
    print(report.smoothness)          # 0.87
    print(report.task_completion)     # True
    print(report.kinematic_feasible)  # True
    print(report.overall)             # 0.82

    # ── Compose (Tier 3: Deepest moat) ──
    dataset = tq.compose(
      tasks=['pick', 'place', 'pour'],
      quality_min=0.75,
      balance='stratified',
      sim_ratio=0.3,
      embodiments=['aloha2', 'franka'],
      version='pick_place_v3'
    )

    # ── Train (Tier 3: Full pipeline) ──
    loader = tq.DataLoader(dataset, batch_size=32, shuffle=True)
    for batch in loader:
      obs, actions = batch['observations'], batch['actions']
      loss = policy(obs, actions)
      tq.log(loss=loss.item())

    # ── Trace (Tier 3: Full lineage) ──
    tq.checkpoint.save(policy, dataset='pick_place_v3',
      metrics={'success_rate': 0.91})
    lineage = tq.trace('policy_v3')

# ══════════════════════════════════════════════════════════════════════════════
# 5.5 GRAVITY WELL CONVERSION MODEL
# ══════════════════════════════════════════════════════════════════════════════

gravity_well_model:

  philosophy: >
    Every SDK feature has a moment where local execution succeeds but leaves
    an unanswered question that only aggregate, collaborative, or cloud-scale
    data can resolve. Torq SDK solves the immediate problem. datatorq.ai solves
    the next one. The SDK earns trust; the cloud converts it. Gravity wells fire
    after successful task completion — never interrupting a failed or
    in-progress operation.

  cloud_platform: "https://www.datatorq.ai"

  classification_rules:
    - rule: "Airplane Test"
      definition: "Works fully offline, delivers complete value to one user"
      verdict: "SDK — no gravity well"
      example: "tq.quality.score() runs offline. Score returned locally."

    - rule: "Single-Player Test"
      definition: "Full value delivered to a single user with no collaboration"
      verdict: "SDK — no gravity well"
      example: "tq.compose() builds a local dataset. Single researcher, complete value."

    - rule: "Multi-Player Test"
      definition: "Value requires sharing, collaboration, or team coordination"
      verdict: "Cloud — gravity well fires"
      example: "Sharing a composed dataset with a lab collaborator requires cloud."

    - rule: "Impossible Locally Test"
      definition: "Requires aggregate data, community benchmarks, or cloud-scale compute"
      verdict: "Cloud — gravity well fires"
      example: "Comparing your quality score against community median is impossible locally."

  touchpoints:

    - id: "GW-01"
      trigger_function: "tq.quality.score()"
      trigger_condition: "Scoring completes successfully on any episode or episode list."
      local_ceiling: >
        User receives quality scores (0.0–1.0) but has no reference point.
        Is 0.71 good for a pick task? What do high-performing labs score?
        This question cannot be answered without aggregate community data.
      cloud_resolution: >
        Community quality benchmarks aggregated across datatorq.ai users,
        broken down by task type and embodiment. Anonymised, opt-in contribution.
      prompt_text: >
        "Your episodes scored {score:.2f}. Want to see how this compares
        to the community? → https://www.datatorq.ai"
      classification: "Impossible Locally"
      strength: "STRONGEST — unanswerable without aggregate data"
      note: >
        No invented benchmark numbers in prompt. The comparison is the pull —
        not a fabricated statistic. Thresholds calibrated during Phase 1 validation.

    - id: "GW-02"
      trigger_function: "tq.compose()"
      trigger_condition: "Dataset composition completes and dataset contains >0 episodes."
      local_ceiling: >
        User has a composed dataset locally but cannot share it with
        collaborators, publish it with a DOI for citation, or version it
        with team-visible provenance.
      cloud_resolution: >
        Dataset sharing, team workspaces, DOI assignment for academic citation,
        published quality reports (CC-01, CC-02).
      prompt_text: >
        "Dataset '{dataset_name}' composed: {n} episodes, quality avg {score:.2f}.
        Share with your lab or publish with a citable DOI
        → https://www.datatorq.ai"
      classification: "Multi-Player"
      strength: "STRONG — academic users have a natural sharing need"

    - id: "GW-03"
      trigger_function: "tq.DataLoader()"
      trigger_condition: "Dataset size exceeds 50GB at DataLoader initialisation."
      local_ceiling: >
        Local disk and RAM become the bottleneck for large-scale training.
        Downloading TBs of data before training is impractical. Multi-GPU
        training requires distributed data serving.
      cloud_resolution: >
        Cloud-streaming DataLoader without local download. Locality-aware shard
        assignment for multi-node runs (ML-01, ML-08).
      prompt_text: >
        "Dataset is {size:.1f}GB. Stream directly to your training loop
        without downloading → https://www.datatorq.ai"
      classification: "Impossible Locally"
      strength: "STRONG — hits at scale, exactly when users need it most"

    - id: "GW-04"
      trigger_function: "tq.cloud()"
      trigger_condition: >
        Explicit user call, or any cloud-only keyword argument passed to a
        local function (e.g. tq.compose(..., publish=True)).
      local_ceiling: "N/A — user is explicitly requesting cloud features."
      cloud_resolution: "Full cloud platform: dashboard, team workspaces, community benchmarks."
      prompt_text: >
        "Torq Cloud is in early access.
        Join the waitlist → https://www.datatorq.ai"
      classification: "Explicit"
      strength: "BASELINE — always-on waitlist entry point"

    - id: "GW-05"
      trigger_function: "tq.query() / tq.compose()"
      trigger_condition: "Result set returns fewer than 5 episodes."
      local_ceiling: >
        User's local collection is insufficient for the task. 'Where do I get
        more pick demonstrations for ALOHA-2?' cannot be answered from local
        data alone.
      cloud_resolution: >
        Community dataset pool and marketplace — discover and import episodes
        contributed by other labs for the same task/embodiment (CC-05, QE-05).
      prompt_text: >
        "Only {n} episodes found for task='{task}', embodiment='{embodiment}'.
        Discover community episodes for this task
        → https://www.datatorq.ai"
      classification: "Impossible Locally"
      strength: "MODERATE — fires when users most feel the data scarcity problem"

  implementation_spec:

    pattern: |
      def _gravity_well(
          message: str,
          feature: str,
          url: str = "https://www.datatorq.ai"
      ) -> None:
          """Print a cloud escalation prompt after successful local task completion."""
          if not _config.quiet:
              print(f"\n\U0001f4a1 {message}")
              print(f"   \u2192 {url}\n")
          _telemetry_ping(feature=feature)  # opt-in only

    telemetry:
      opt_in: true
      opt_in_mechanism: >
        First gravity well prompt includes one-time consent request:
        "Help improve Torq by sharing anonymous usage data? [y/N]"
        Preference stored in ~/.torq/config.toml. Default: N (no telemetry).
      data_captured:
        - "gravity well ID (e.g. GW-01)"
        - "timestamp (UTC)"
        - "torq SDK version"
        - "python version"
        - "OS platform"
      data_NOT_captured:
        - "file paths, dataset names, episode content"
        - "quality scores or any user data"
        - "IP address"

  ordering_principle: >
    GW-01 (quality benchmarks) is the highest-priority well to activate at
    cloud launch. It fires for every user who runs quality scoring — the core
    SDK workflow — and poses a question that is genuinely impossible to answer
    locally. This is the primary conversion mechanism from free SDK to first
    paying cloud feature.

# ══════════════════════════════════════════════════════════════════════════════
# 6. ALLOY INTERVENTION SCENARIOS & MITIGATION
# ══════════════════════════════════════════════════════════════════════════════

alloy_intervention_scenarios:

  - id: "A"
    scenario: "Alloy Adds Training Data Export"
    probability: "90%"
    timeline: "3–6 months"
    description: >
      Alloy extends their 'Scenarios Become Training Data' feature to export
      scenarios as PyTorch-compatible datasets. Basic DataLoader wrapper. No
      quality scoring, no composition, no versioning.
    impact: >
      Low-sophistication users who just need 'data out' may not adopt Torque.
      Headlines will read 'Alloy adds training data support.' Superficial
      feature parity in marketing materials.
    mitigation: >
      Accelerate quality scoring and composition features. The message: 'Alloy
      exports data. Torque composes training datasets.' Run benchmarks showing
      quality-scored, composed datasets train better policies with fewer
      demonstrations.

  - id: "B"
    scenario: "Alloy Adds Episode Segmentation"
    probability: "40%"
    timeline: "12–18 months"
    description: >
      Alloy adapts their scenario clustering to segment missions into 'episodes'
      for training. Quality is crude — no smoothness analysis, no kinematic
      validation — but the terminology converges.
    impact: >
      Medium. Alloy can claim 'episode management' on their feature list.
    mitigation: >
      By this point, Torque's episode model must be so deeply integrated with
      quality scoring, composition, and training that 'episode' means something
      fundamentally richer in Torque. Episodes are not just segmented data —
      they're quality-scored, annotated, versioned, and linked to training outcomes.

  - id: "C"
    scenario: "Alloy Pivots to Training Infrastructure"
    probability: "15%"
    timeline: "18–24 months"
    description: >
      Alloy pivots their core product toward pre-deployment training data
      management, becoming a direct competitor.
    impact: >
      High. Direct competition with better funding ($3M vs. bootstrapped),
      existing customers, and VC backing. This is the existential scenario.
    mitigation: >
      Speed. If Torque has 12–18 months of training-specific features and SDK
      adoption, Alloy starts from scratch in a space where Torque has
      established conventions. The W&B playbook proves developer tool switching
      costs are real once teams integrate at the SDK level.

  - id: "D"
    scenario: "Airtree Funds Both"
    probability: "60%"
    timeline: null
    description: >
      Jackie Vullinghs at Airtree sees Alloy and Torque as complementary
      investments. Airtree invests in Torque's pre-seed, creating a portfolio
      where Alloy handles post-deployment and Torque handles pre-deployment.
    impact: >
      Highly positive. Validates complementary positioning. Creates strategic
      partnership: data flows from Alloy's production monitoring into Torque's
      training pipeline for continuous improvement.
    action: >
      Frame the Alloy–Torque relationship as 'Datadog + Weights & Biases for
      robotics.' Airtree's portfolio is stronger with both. Prepare 1-page
      diagram: Torque (training) → deployed robot → Alloy (monitoring) →
      Torque (failure-to-training feedback loop).

# ══════════════════════════════════════════════════════════════════════════════
# 7. RELEASE PLAN (Competitive-Accelerated)
# ══════════════════════════════════════════════════════════════════════════════

release_plan:
  note: >
    v2.0 change: Quality scoring and composition features move from R2 to R1
    (Alpha) because they are now the primary competitive differentiators.

  releases:
    - release: "R1: Alpha"
      timeline: "Month 3"
      deliverables: >
        SDK (tq.ingest, tq.quality.score, tq.compose), Episode store, Quality
        scoring engine, Basic composition, PyTorch DataLoader, CLI
      competitive_purpose: >
        Establish training-specific tooling before Alloy extends. Land 3–5
        academic design partners.

    - release: "R2: Beta"
      timeline: "Month 6"
      deliverables: >
        Cloud dashboard, NL search (training semantics), Sim-to-real mixing,
        Dataset versioning, W&B integration, Team workspaces
      competitive_purpose: >
        Make Torque sticky for teams. Integration depth creates switching costs.

    - release: "R3: GA"
      timeline: "Month 9"
      deliverables: >
        Cross-embodiment normalization, Policy experiment tracking, Dataset
        marketplace (beta), Enterprise SSO/RBAC
      competitive_purpose: >
        Expand to foundation model training teams. Begin enterprise sales.

    - release: "R4: Scale"
      timeline: "Month 12"
      deliverables: >
        Distributed data serving, Auto-composition ML, Alloy integration
        (production-to-training feedback loop), Custom quality plugins
      competitive_purpose: >
        Platform maturity. Consider strategic Alloy partnership.

