# 2. TARGET USERS & PERSONAS
# ══════════════════════════════════════════════════════════════════════════════

personas:

  primary:
    name: "Dr. Maya Chen"
    role: "Robot Learning Researcher"
    title: "Senior Research Scientist at a university or corporate robotics lab"
    background: "PhD in robotics or ML, publishes at CoRL/RSS/ICRA"
    daily_workflow: >
      Collecting teleoperation demonstrations on ALOHA-2 or similar hardware,
      training VLA/ACT policies, iterating on dataset composition.
    pain_points:
      - "Spends 40% of time on data plumbing (format conversion, quality filtering, dataset balancing)"
      - "Uses 3–6 incompatible tools (Foxglove for viz, custom scripts for filtering, LeRobot format for training, W&B for experiment tracking)"
    why_alloy_doesnt_serve_maya: >
      Maya doesn't operate deployed robots. She doesn't have 'missions' or
      'fleet anomalies.' She has teleoperation demonstrations that need quality
      assessment and composition into training datasets. Alloy's entire workflow
      (upload MCAP → search anomalies → cluster failures → generate reports)
      is irrelevant to her daily work.
    user_stories:
      - >
        As a researcher, I want to import episodes from MCAP, HDF5, or LeRobot
        format with a single CLI command so I can start curating data immediately
        without writing conversion scripts.
      - >
        As a researcher, I want automated quality scores on every demonstration
        so I can filter out bad episodes before they contaminate my training dataset.
      - >
        As a researcher, I want to compose a training dataset by specifying task
        distribution, quality threshold, and sim-to-real ratio in a single API call.

  secondary:
    name: "Jake Torres"
    role: "ML Engineer at a Robotics Startup"
    title: "ML Engineer at a Series A robotics startup building manipulation or locomotion products"
    background: "MS in ML/robotics, responsible for training pipeline and model deployment"
    daily_workflow: >
      Managing dataset versions, running training jobs, tracking policy
      performance, debugging failures by reviewing training data.
    pain_points:
      - "No single system connects data collection to training output"
      - "Dataset versioning is manual"
      - "Can't trace a failed policy back to specific training episodes"
    alloy_overlap_risk: >
      Jake's startup may already use Alloy for post-deployment monitoring. If
      Alloy adds training data export features, Jake might resist adopting a
      second platform. Torque must deliver enough training-specific value
      (quality scoring, composition engine, pipeline integration) that Jake sees
      it as essential tooling Alloy cannot replace, analogous to how teams use
      both Datadog AND Weights & Biases.
    user_stories:
      - >
        As an ML engineer, I want to query all successful grasp episodes from our
        ALOHA-2 arm with force-torque data so I can build a high-quality training
        dataset in minutes instead of hours.
      - >
        As an ML engineer, I want to stream episodes directly to my PyTorch
        DataLoader from cloud storage so I can start training immediately without
        downloading TBs of data.
      - >
        As an ML engineer, I want to trace any trained policy back to the exact
        dataset version and episodes that produced it for debugging and reproducibility.

  tertiary:
    name: "Dr. Sarah Kim"
    role: "Sim-to-Real Research Lead"
    title: "Research lead managing sim-to-real transfer pipelines"
    background: "Expert in domain randomization, simulation-to-reality gap bridging"
    daily_workflow: >
      Generating synthetic demonstrations in Isaac Sim, mixing with real
      teleoperation data, evaluating transfer quality.
    pain_points:
      - "No tool manages the composition of synthetic and real data with quality-aware mixing ratios"
    alloy_gap: >
      Alloy has zero presence in this space. Sim-to-real composition is
      structurally impossible from an operational monitoring platform. This
      persona represents Torque's deepest competitive moat.
    user_stories:
      - >
        As a sim-to-real lead, I want to compose training datasets with
        configurable sim-to-real ratios and domain gap thresholds so I can
        systematically optimize transfer performance.
      - >
        As a lab PI, I want automated quality reports showing data distribution,
        success rates, and anomalies across all our robot platforms so I can make
        informed decisions about what data to collect next.

